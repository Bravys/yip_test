<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Plant Care App</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1, h2, h3 { margin-top: 20px; }
    #searchBar, #diseaseSearch {
      width: 80%;
      padding: 10px;
      margin: 20px auto;
      border-radius: 8px;
      border: none;
      display: block;
    }
    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      border-radius: 20px;
      border: none;
      background-color: #1f1f1f;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover { background-color: #333; }
    #homeScreen, #plantScreen { display: none; }
    #details, #remedies { margin: 20px; text-align: left; }
  </style>
</head>
<body>
  <div id="homeScreen">
    <h1>🌱 Plant Care</h1>
    <input type="text" id="searchBar" placeholder="Search plants...">
    <div id="buttons"></div>
  </div>

  <div id="plantScreen">
    <h2 id="plantName"></h2>
    <div id="details"></div>
    <h3>Check for Diseases</h3>
    <input type="text" id="diseaseSearch" placeholder="Enter disease name...">
    <div id="remedies"></div>
    <button onclick="goHome()">⬅ Back</button>
  </div>

  <script>
    const plants = [
      "Mango 🥭","Jackfruit 🫒","Hibiscus 🫒","Rose 🌹","Coconut 🥥",
      "Plantain 🍌","Wild Jack 🍊","Jasmine ✿","Ixora 🏵️"
    ];

    const plantData = {
      Mango: { soil:"Loamy", water:"Weekly", manure:"Organic compost", speciality:"Sweet fruit" },
      Jackfruit: { soil:"Sandy loam", water:"Weekly", manure:"Farmyard manure", speciality:"Large edible fruit" },
      Hibiscus: { soil:"Well-drained", water:"Every 2 days", manure:"Potash-rich fertilizer", speciality:"Medicinal flower" },
      Rose: { soil:"Clay loam", water:"Every 2 days", manure:"Bone meal", speciality:"Fragrant flower" },
      Coconut: { soil:"Sandy coastal", water:"Daily", manure:"Cow dung", speciality:"Multipurpose tree" },
      Plantain: { soil:"Rich loam", water:"Daily", manure:"Banana manure mix", speciality:"Fruit plant" },
      "Wild Jack": { soil:"Laterite", water:"Weekly", manure:"Organic compost", speciality:"Wild fruit tree" },
      Jasmine: { soil:"Well-drained", water:"Every 2 days", manure:"Phosphorus fertilizer", speciality:"Fragrant flower" },
      Ixora: { soil:"Acidic soil", water:"Every 2 days", manure:"NPK fertilizer", speciality:"Ornamental shrub" }
    };

    const diseaseRemedies = {
      "powdery mildew": "Spray neem oil, avoid excess moisture.",
      "leaf spot": "Remove affected leaves, use copper fungicide.",
      "root rot": "Improve drainage, reduce watering."
    };

    // Generate home buttons
    const btnContainer = document.getElementById("buttons");
    plants.forEach(p => {
      const btn = document.createElement("button");
      btn.innerText = p;
      btn.onclick = () => openPlantPage(p);
      btnContainer.appendChild(btn);
    });

    // Search bar logic
    document.getElementById("searchBar").addEventListener("keyup", e => {
      if (e.key === "Enter") {
        const query = e.target.value.toLowerCase();
        const found = plants.find(p => p.toLowerCase() === query);
        if (found) openPlantPage(found);
        else alert("Plant not found!");
      }
    });

    function openPlantPage(name) {
      document.getElementById("homeScreen").style.display = "none";
      document.getElementById("plantScreen").style.display = "block";
      document.getElementById("plantName").innerText = name;
      const d = plantData[name];
      document.getElementById("details").innerHTML = `
        <p><b>Speciality:</b> ${d.speciality}</p>
        <p><b>Soil:</b> ${d.soil}</p>
        <p><b>Watering:</b> ${d.water}</p>
        <p><b>Manure:</b> ${d.manure}</p>
      `;
      document.getElementById("diseaseSearch").value = "";
      document.getElementById("remedies").innerText = "";
    }

    document.getElementById("diseaseSearch").addEventListener("keyup", e => {
      if (e.key === "Enter") {
        const query = e.target.value.toLowerCase();
        const remedy = diseaseRemedies[query];
        document.getElementById("remedies").innerText = remedy ? remedy : "No remedy found.";
      }
    });

    function goHome() {
      document.getElementById("plantScreen").style.display = "none";
      document.getElementById("homeScreen").style.display = "block";
    }

    // Start at home screen
    document.getElementById("homeScreen").style.display = "block";
  </script>
</body>
</html>
