<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Plant Care App</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1, h2, h3 { margin-top: 20px; }
    #searchBar, #diseaseSearch {
      width: 80%;
      padding: 10px;
      margin: 20px auto;
      border-radius: 8px;
      border: none;
      display: block;
    }
    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      border-radius: 20px;
      border: none;
      background-color: #1f1f1f;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover { background-color: #333; }
    #homeScreen, #plantScreen { display: none; }
    #details, #remedies { margin: 20px; text-align: left; }
    #langToggle { margin: 20px auto; width: 40%; }
  </style>
</head>
<body>
  <div id="homeScreen">
    <h1 id="title">🌱 Plant Care</h1>
    <button id="langToggle">മലയാളം</button>
    <input type="text" id="searchBar" placeholder="Search plants...">
    <div id="buttons"></div>
  </div>

  <div id="plantScreen">
    <h2 id="plantName"></h2>
    <div id="details"></div>
    <h3 id="diseaseTitle">Check for Diseases</h3>
    <input type="text" id="diseaseSearch" placeholder="Enter disease name...">
    <div id="remedies"></div>
    <button onclick="goHome()">⬅ Back</button>
  </div>

      }
    };

    const diseaseRemedies = {
      en: {

      ml: {
        "പൗഡറി മിൽഡ്യൂ": "നീം ഓയിൽ തളിക്കുക, അധിക ഈർപ്പം ഒഴിവാക്കുക.",

      }
    };

    // Generate buttons
    function renderButtons() {
      const btnContainer = document.getElementById("buttons");
      btnContainer.innerHTML = "";
      plants[lang].forEach(p => {
        const btn = document.createElement("button");
        btn.innerText = p;
        btn.onclick = () => openPlantPage(p);
        btnContainer.appendChild(btn);
      });
    }

    // Search bar logic
    document.getElementById("searchBar").addEventListener("keyup", e => {
      if (e.key === "Enter") {
        const query = e.target.value.toLowerCase();
        const found = plants[lang].find(p => p.toLowerCase() === query);
        if (found) openPlantPage(found);
        else alert(lang === "en" ? "Plant not found!" : "ചെടി കണ്ടെത്തിയില്ല!");
      }
    });

    function openPlantPage(name) {
      document.getElementById("homeScreen").style.display = "none";
      document.getElementById("plantScreen").style.display = "block";
      document.getElementById("plantName").innerText = name;
      const d = plantData[lang][name];
      document.getElementById("details").innerHTML = `
        <p><b>${lang==="en"?"Speciality":"പ്രത്യേകത"}:</b> ${d.speciality}</p>
        <p><b>${lang==="en"?"Soil":"മണ്ണ്"}:</b> ${d.soil}</p>
        <p><b>${lang==="en"?"Watering":"വെള്ളം"}:</b> ${d.water}</p>
        <p><b>${lang==="en"?"Manure":"വളം"}:</b> ${d.manure}</p>
      `;
      document.getElementById("diseaseTitle").innerText = lang==="en" ? "Check for Diseases" : "രോഗങ്ങൾ പരിശോധിക്കുക";

      document.getElementById("remedies").innerText = "";
    }
